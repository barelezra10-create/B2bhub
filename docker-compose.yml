services:
  postgres:
    image: postgres:16-alpine
    container_name: b2b-hub-postgres
    environment:
      POSTGRES_USER: b2bhub
      POSTGRES_PASSWORD: b2bhub_dev
      POSTGRES_DB: b2bhub
    ports:
      - "5432:5432"
    volumes:
      - b2b_hub_pg_data:/var/lib/postgresql/data

volumes:
  b2b_hub_pg_data:
